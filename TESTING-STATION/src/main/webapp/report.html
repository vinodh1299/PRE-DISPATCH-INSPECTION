<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YIL Assembly Tracking - Monthly Report</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #111; }
        form { margin: 40px auto; padding: 15px; background: #f4f4f4; border-radius: 8px; width: fit-content; }
        label { margin-right: 10px; }
        select, button { padding: 6px 10px; font-size: 14px; margin-right: 8px; }
    </style>
</head>
<body>
    <h2>YIL Assembly Tracking System - Monthly Report</h2>

    <form method="GET" action="ChecklistUploadServlet">
        <label for="month">Month:</label>
        <select name="month" id="month" required>
            <option value="">--Select Month--</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <label for="year">Year:</label>
        <select name="year" id="year" required>
            <option value="">--Select Year--</option>
            <!-- Add some years -->
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
        </select>

        <button type="submit">Fetch Data</button>
    </form>
</body>
</html>
