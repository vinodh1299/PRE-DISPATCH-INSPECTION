<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fetch Assembly Data</title>
</head>
<body>
  <h1>Assembly Data Fetcher</h1>
  <button id="fetchBtn">Fetch Data</button>
  <pre id="output"></pre>

  <script>
    document.getElementById("fetchBtn").addEventListener("click", () => {
      fetch("testServlet")
        .then(response => {
          if (!response.ok) {
            throw new Error("Network response was not ok " + response.statusText);
          }
          return response.text(); // change to .json() if servlet returns JSON
        })
        .then(data => {
          document.getElementById("output").textContent = data;
        })
        .catch(error => {
          document.getElementById("output").textContent = "Error: " + error;
        });
    });
  </script>
</body>
</html>
